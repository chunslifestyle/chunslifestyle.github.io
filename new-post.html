---
layout: default
title: 新增文章
---
<h1>新增文章</h1>

<form id="newPostForm">
  <label>文章標題:</label><br>
  <input type="text" id="title" style="width:100%" required><br><br>

  <label>日期 (YYYY-MM-DD):</label><br>
  <input type="text" id="date" style="width:100%" value="{{ 'now' | date: '%Y-%m-%d' }}" required><br><br>

  <label>分類 (categories):</label><br>
  <input type="text" id="categories" style="width:100%" value="生活"><br><br>

  <label>標籤 (tags, 用逗號分隔):</label><br>
  <input type="text" id="tags" style="width:100%" value="想法,隨筆"><br><br>

  <label>文章內容:</label><br>
  <textarea id="content" rows="10" style="width:100%" required></textarea><br><br>

  <button type="submit" style="padding:8px 12px;background:#007acc;color:#fff;border:none;border-radius:4px;">生成 Markdown</button>
</form>

<h2>生成結果</h2>
<textarea id="output" rows="15" style="width:100%"></textarea>
<p>複製上方內容到 <code>_posts/YYYY-MM-DD-文章標題.md</code> 即可。</p>

<script>
document.getElementById('newPostForm').addEventListener('submit', function(e){
  e.preventDefault();
  const title = document.getElementById('title').value;
  const date = document.getElementById('date').value;
  const categories = document.getElementById('categories').value;
  const tags = document.getElementById('tags').value.split(',').map(t => t.trim());
  const content = document.getElementById('content').value;

  const filename = date + '-' + title.toLowerCase().replace(/\s+/g,'-') + '.md';
  const markdown = `---
layout: default
title: "${title}"
date: ${date}
categories: [${categories}]
tags: [${tags.join(', ')}]
---

${content}
`;

  document.getElementById('output').value = markdown;
  alert('文章 Markdown 已生成！請複製到 _posts/' + filename);
});
</script>
