<!DOCTYPE html>

<head>

<title>新增文章 - Mono文藝記事部落格</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Serif JP', serif; background:#FAFAFA; color:#222; line-height:1.6; }
a { text-decoration:none; color:inherit; }
header { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:#FFF; border-bottom:1px solid #DDD; position:sticky; top:0; }
header .logo { font-family:'Sawarabi Mincho', serif; font-size:1.5rem; font-weight:bold; }
nav a { margin-left:1.5rem; font-weight:500; transition:color 0.3s; }
nav a:hover { color:#555; }
.section { padding:3rem 2rem; max-width:800px; margin:0 auto; }
.section h2 { font-family:'Sawarabi Mincho', serif; font-size:2rem; margin-bottom:1rem; text-align:center; }
form { display:flex; flex-direction:column; }
form input, form textarea { padding:0.8rem; margin-bottom:1rem; border:1px solid #DDD; border-radius:6px; font-size:1rem; }
form button { padding:0.8rem; font-size:1rem; border:none; border-radius:6px; background:#222; color:#FFF; cursor:pointer; transition:background 0.3s; }
form button:hover { background:#555; }
footer { text-align:center; padding:2rem 1rem; margin-top:2rem; border-top:1px solid #DDD; color:#222; font-size:0.9rem; }
footer a { color:#555; margin:0 0.5rem; transition:color 0.3s; }
footer a:hover { color:#222; }
</style>
</head>
<body>

<header>
  <div class="logo">Mono文藝記事</div>
  <nav>
    <a href="index.html">首頁</a>
    <a href="categories.html">分類</a>
    <a href="archives.html">彙整</a>
    <a href="about.html">關於</a>
    <a href="new-post.html">新增文章</a>
  </nav>
</header>

<section class="section">
  <h2>新增文章</h2>
  <form>
    <input type="text" placeholder="文章標題" required>
    <textarea rows="6" placeholder="文章內容" required></textarea>
    <button type="submit">發佈</button>
  </form>
</section>

<footer>
  &copy; 2026 Mono文藝記事部落格 | <a href="about.html">關於</a> | <a href="#">聯絡</a>
