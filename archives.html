<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>文章彙整</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="navbar">
<a href="index.html">首頁</a>
<a href="categories.html">分類</a>
<a href="archives.html">彙整</a>
</div>

<h1>文章彙整</h1>

<div id="archives-list">
載入中...
</div>

</div>

<script>

// 改成你的 GitHub 使用者名稱與 repo 名稱
const username = "chunslifestyle";
const repo = "chunslifestyle.github.io";

const apiUrl =
`https://api.github.com/repos/${username}/${repo}/contents/`;

fetch(apiUrl)
.then(response => response.json())
.then(files => {

const list = document.getElementById("archives-list");

let posts = files
.filter(file =>
file.name.match(/^\\d{4}-\\d{2}-\\d{2}\\.html$/)
);

// 依日期排序（新到舊）
posts.sort((a, b) =>
b.name.localeCompare(a.name)
);

list.innerHTML = "";

posts.forEach(post => {

let date = post.name.replace(".html", "");

let link = document.createElement("p");

link.innerHTML =
`${date}：<a href="${post.name}">
${date}
</a>`;

list.appendChild(link);

});

})
.catch(error => {

document.getElementById("archives-list")
.innerHTML = "無法載入文章列表";

});

</script>

</body>
</html>
