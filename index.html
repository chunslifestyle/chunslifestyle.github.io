<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淳文字</title>
    <style>
        /* 全站字型與背景 */
        body {
            font-family: "Noto Sans TC", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fdfdfd;
            color: #333;
        }

        /* 導覽列樣式 */
        nav {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 20px;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }
        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav ul li a:hover {
            color: #007acc;
        }

        /* 標題 */
        header {
            text-align: center;
            padding: 50px 20px 30px 20px;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        header h2 {
            margin-top: 10px;
            font-weight: normal;
            color: #666;
        }

        /* 最新文章 */
        section.latest-articles {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        section.latest-articles h3 {
            border-bottom: 2px solid #007acc;
            display: inline-block;
            padding-bottom: 5px;
        }
        section.latest-articles ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }
        section.latest-articles ul li {
            margin-bottom: 10px;
        }
        section.latest-articles ul li a {
            text-decoration: none;
            color: #007acc;
            transition: color 0.3s;
        }
        section.latest-articles ul li a:hover {
            text-decoration: underline;
        }

        /* 響應式 */
        @media (max-width: 600px) {
            nav ul {
                flex-direction: column;
                gap: 10px;
            }
            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
<script>
  // 自動生成最新文章列表
  document.addEventListener("DOMContentLoaded", function() {
    const articles = [
      { title: "文章標題 1", url: "2026-03-21.html" },
      { title: "文章標題 2", url: "2026-03-22.html" },
      { title: "文章標題 3", url: "new-post.html" }
      // 可繼續增加文章
    ];

    const ul = document.querySelector("section.latest-articles ul");
    ul.innerHTML = ""; // 清空原本列表

    articles.forEach(article => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = article.url;
      a.textContent = article.title;
      li.appendChild(a);
      ul.appendChild(li);
    });
  });
</script>
    <!-- 導覽列 -->
    <nav>
        <ul>
            <li><a href="index.html">首頁</a></li>
            <li><a href="categories.html">分類</a></li>
            <li><a href="archives.html">彙整</a></li>
            <li><a href="about.html">關於</a></li>
        </ul>
    </nav>

    <!-- 標題 -->
    <header>
        <h1>淳文字</h1>
        <h2>邁入知天命的人生新境</h2>
    </header>

    <!-- 最新文章 -->
    <section class="latest-articles">
        <h3>最新文章</h3>
        <ul>
            <li><a href="#">文章標題 1</a></li>
            <li><a href="#">文章標題 2</a></li>
            <li><a href="#">文章標題 3</a></li>
        </ul>
    </section>

</body>
</html>
