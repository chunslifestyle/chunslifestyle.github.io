<h2>
最新文章
</h2>

<div id="post-list">
  <div class="post-list">
    <div class="post-title"><a href="2026-03-21.html">接近完成的github網站</a></div>
    <div class="post-date">2026-03-22</div>
  </div>
  <div class="post-list">
    <div class="post-title"><a href="2026-03-22.html">下一篇文章標題</a></div>
    <div class="post-date">2026-03-23</div>
  </div>
</div>

<script>

const username = "chunslifestyle";
const repo = "chunslifestyle.github.io";

const apiUrl =
`https://api.github.com/repos/${username}/${repo}/contents/`;

fetch(apiUrl)
.then(response => response.json())
.then(files => {

const list =
document.getElementById("post-list");

let posts = files
.filter(file =>
file.name.match(/^\\d{4}-\\d{2}-\\d{2}\\.html$/)
);

// 新到舊排序
posts.sort((a, b) =>
b.name.localeCompare(a.name)
);

// 只顯示最新 10 篇
posts = posts.slice(0, 10);

list.innerHTML = "";

posts.forEach(post => {

let date =
post.name.replace(".html", "");

let item =
document.createElement("div");

item.className = "post-list";

item.innerHTML = `

<div class="post-title">

<a href="${post.name}">
${date}
</a>

</div>

<div class="post-date">
${date}
</div>

`;

list.appendChild(item);

});

})
.catch(error => {

document.getElementById("post-list")
.innerHTML =
"無法載入文章列表";

});

</script>

</body>
