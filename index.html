<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">

<title>Mono文藝記事部落格</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="navbar">

<a href="index.html">首頁</a>

<a href="categories.html">分類</a>

<a href="archives.html">彙整</a>

</div>

<h1 class="site-title">
Mono文藝記事部落格
</h1>

<p>
簡約、單色的文字記事部落格，
專注內容與留白感
</p>

<h2>
最新文章
</h2>

<div id="post-list">

載入中...

</div>

</div>

<script>

const username = "chunslifestyle";
const repo = "chunslifestyle.github.io";

const apiUrl =
`https://api.github.com/repos/${username}/${repo}/contents/`;

fetch(apiUrl)
.then(response => response.json())
.then(files => {

const list =
document.getElementById("post-list");

let posts = files
.filter(file =>
file.name.match(/^\\d{4}-\\d{2}-\\d{2}\\.html$/)
);

// 新到舊排序
posts.sort((a, b) =>
b.name.localeCompare(a.name)
);

// 只顯示最新 10 篇
posts = posts.slice(0, 10);

list.innerHTML = "";

posts.forEach(post => {

let date =
post.name.replace(".html", "");

let item =
document.createElement("div");

item.className = "post-list";

item.innerHTML = `

<div class="post-title">

<a href="${post.name}">
${date}
</a>

</div>

<div class="post-date">
${date}
</div>

`;

list.appendChild(item);

});

})
.catch(error => {

document.getElementById("post-list")
.innerHTML =
"無法載入文章列表";

});

</script>

</body>
</html>
