<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC&display=swap" rel="stylesheet">

<style>
body,h1,h2,h3,p,a,li{
  font-family:'Noto Serif TC',"PMingLiU","MingLiU","Microsoft JhengHei",sans-serif;
  margin:0;padding:0;color:#333;line-height:1.6;
}

/* 導覽列 */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  background:#fff;
  z-index:100;
}
.nav a{
  margin-left:15px;
  text-decoration:none;
  color:#333;
}
.nav-toggle{
  display:none;
  font-size:1.5em;
  cursor:pointer;
}
.nav-links{
  display:flex;
  align-items:center;
}

/* 內容 */
.container{
  max-width:700px;
  margin:40px auto;
  padding:0 15px;
}

/* 文章 */
.post-item{
  margin-bottom:25px;
  padding-bottom:15px;
  border-bottom:1px solid #eee;
}
.article-link{
  display:block;
  margin:5px 0;
  text-decoration:none;
  color:#007acc;
  font-weight:bold;
  word-break:break-word;
}
.post-date{
  font-size:0.85em;
  color:#999;
}

/* 標籤 */
.tags a{
  margin-right:8px;
  text-decoration:none;
  color:#555;
  font-size:0.85em;
}

/* 圖片 */
img{
  max-width:100%;
  height:auto;
  border-radius:8px;
}

/* 手機版 */
@media(max-width:768px){
  .nav-links{
    display:none;
    flex-direction:column;
    background:#fff;
    position:absolute;
    top:60px;
    right:0;
    width:200px;
    border:1px solid #eee;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
  }
  .nav-links a{
    margin:10px 0;
    padding:10px 20px;
  }
  .nav-toggle{
    display:block;
  }
}
</style>
</head>

<body>

<!-- 導覽列 -->
<div class="nav">
  <div><a href="/">Chun</a></div>

  <div class="nav-toggle" onclick="toggleNav()">☰</div>

  <div class="nav-links">
    <nav class="nav">
  <a href="/index.html">首頁</a>
  <a href="/about.html">關於</a>
  <a href="/categories/index.html">分類</a>
  <a href="/tags/index.html">標籤</a>
  <a href="/archives.html">彙整</a>
  <a href="/new-post.html">發布</a>
</nav>
  </div>
</div>

<!-- 內容區 -->
<div class="container">

{% if page.protected %}

  <div id="protected">
    <h2>🔒 此文章已加密</h2>
    <input type="password" id="pwd" placeholder="輸入密碼">
    <button onclick="checkPwd()">解鎖</button>
  </div>

  <div id="content" style="display:none;">
    {{ content }}
  </div>

{% else %}

  {{ content }}

{% endif %}

</div>

<script>
function toggleNav(){
  const l=document.querySelector('.nav-links');
  l.style.display=(l.style.display==='flex')?'none':'flex';
}

// 加密功能
async function checkPwd() {
  const input = document.getElementById('pwd').value;

  const hash = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(input)
  );

  const hashHex = Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');

  const correct = "{{ page.password | default: '' }}";

  if (hashHex === correct || input === correct) {
    document.getElementById('protected').style.display = "none";
    document.getElementById('content').style.display = "block";
  } else {
    alert("密碼錯誤！");
  }
}
</script>

</body>
</html>
