---
layout: default
---

<style>
.article {
  max-width: 720px;
  margin: 60px auto;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  line-height: 1.9;
}

.cover {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 30px;
}

.article h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.meta {
  color: #888;
  margin-bottom: 40px;
}

.article p {
  font-size: 18px;
  margin-bottom: 20px;
}
</style>

<div class="article">
  {% if page.image %}
    <img class="cover" src="{{ page.image }}">
  {% endif %}

  <h1>{{ page.title }}</h1>
  <div class="meta">{{ page.date | date: "%Y-%m-%d" }}</div>

  {{ content }}
</div>
