---
layout: default
---

<style>
.article {
  max-width: 720px;
  margin: 60px auto;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  line-height: 1.9;
}

.cover {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 30px;
}

.article h1 {
  font-size: 40px;
}

.meta {
  color: #888;
  margin: 10px 0 40px;
}

.article p {
  font-size: 18px;
}
</style>

<div class="article">

  {% if page.image %}
    <img class="cover" src="{{ page.image }}">
  {% endif %}

  <h1>{{ page.title }}</h1>
  <div class="meta">{{ page.date | date: "%Y-%m-%d" }}</div>

  {{ content }}

</div>

<div class="meta">
  {{ page.date | date: "%Y-%m-%d" }} · 
  {% for cat in page.categories %}
    #{{ cat }}
  {% endfor %}
</div>
